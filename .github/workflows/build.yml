name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Locate kbd.h (shipped with Windows SDK on runner image)
        shell: pwsh
        run: |
          $kbd = Get-ChildItem -Path 'C:\Program Files (x86)\Windows Kits\10\Include' -Recurse -Filter 'kbd.h' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $kbd) {
            throw 'kbd.h not found in Windows SDK include tree. Runner image has regressed or SDK component is missing.'
          }
          Write-Host "kbd.h: $($kbd.FullName)"

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Build kbdisdv.dll
        shell: pwsh
        run: |
          .\scripts\build.ps1 -Arch ${{ matrix.arch }}

      - name: Verify DLL size, architecture, and export table
        shell: pwsh
        run: .\tests\verify-dll.ps1 -DllPath "build\${{ matrix.arch }}\kbdisdv.dll" -ExpectedArch "${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: kbdisdv-${{ matrix.arch }}
          path: |
            build/${{ matrix.arch }}/kbdisdv.dll
            scripts/install.ps1
            scripts/uninstall.ps1
          if-no-files-found: error

  qa:
    name: QA (character table golden check)
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: kbdisdv-x64
          path: artifacts/x64
      # upload-artifact@v4 preserves the path hierarchy from the upload, so the
      # DLL lands at artifacts/x64/build/x64/kbdisdv.dll. List and resolve the
      # exact path so this doesn't break if the upload path ever changes.
      - name: Locate downloaded DLL
        id: dll
        shell: pwsh
        run: |
          $found = Get-ChildItem -Path artifacts -Recurse -Filter kbdisdv.dll | Select-Object -First 1
          if (-not $found) { throw "No kbdisdv.dll in downloaded artifact tree." }
          "path=$($found.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding ascii

      - name: Golden-check character table
        shell: pwsh
        run: .\tests\golden-check.ps1 -DllPath "${{ steps.dll.outputs.path }}"

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build, qa]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release bundle
        run: |
          set -euo pipefail
          mkdir -p release/Icelandic-Dvorak-${{ github.ref_name }}
          for a in x86 x64 arm64; do
            mkdir -p release/Icelandic-Dvorak-${{ github.ref_name }}/$a
            cp artifacts/kbdisdv-$a/build/$a/kbdisdv.dll release/Icelandic-Dvorak-${{ github.ref_name }}/$a/
          done
          cp artifacts/kbdisdv-x64/scripts/*.ps1 release/Icelandic-Dvorak-${{ github.ref_name }}/
          cp README.md LICENSE release/Icelandic-Dvorak-${{ github.ref_name }}/
          cd release && zip -r Icelandic-Dvorak-${{ github.ref_name }}.zip Icelandic-Dvorak-${{ github.ref_name }}

      - uses: softprops/action-gh-release@v2
        with:
          files: release/Icelandic-Dvorak-${{ github.ref_name }}.zip
          generate_release_notes: true
