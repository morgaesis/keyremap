name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64, arm64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install kbdutool
        shell: pwsh
        timeout-minutes: 5
        run: .\scripts\install-kbdutool.ps1

      - name: Generate sources
        shell: pwsh
        run: .\scripts\generate.ps1

      - name: Build DLL
        shell: pwsh
        run: .\scripts\build.ps1 -Arch ${{ matrix.arch }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dll-${{ matrix.arch }}
          path: build/${{ matrix.arch }}/kbdisdv.dll
          if-no-files-found: error

  qa:
    name: QA golden check
    runs-on: windows-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dll-x64
          path: artifacts
      - name: Golden-check character table
        shell: pwsh
        run: .\tests\golden-check.ps1 -DllPath .\artifacts\kbdisdv.dll

  package:
    name: Package release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build, qa]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts
      - name: Package release bundle
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          root="release/keyremap-${tag}"
          mkdir -p "$root/x86" "$root/x64" "$root/arm64"
          cp artifacts/dll-x86/kbdisdv.dll "$root/x86/"
          cp artifacts/dll-x64/kbdisdv.dll "$root/x64/"
          cp artifacts/dll-arm64/kbdisdv.dll "$root/arm64/"
          cp scripts/install.ps1 scripts/uninstall.ps1 README.md LICENSE "$root/"
          cp -r docs "$root/"
          cd release && zip -r "keyremap-${tag}.zip" "keyremap-${tag}"
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: release/keyremap-${{ github.ref_name }}.zip
          generate_release_notes: true
