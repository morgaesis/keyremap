name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }} (${{ matrix.variant }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64, arm64]
        variant: [default, caps-altgr, caps-esc, caps-ctrl]
    steps:
      - uses: actions/checkout@v4

      - name: Locate kbd.h (Windows SDK, pre-installed on runner)
        shell: pwsh
        run: |
          $kbd = Get-ChildItem -Path 'C:\Program Files (x86)\Windows Kits\10\Include' -Recurse -Filter 'kbd.h' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $kbd) { throw 'kbd.h not found in Windows SDK include tree.' }
          Write-Host "kbd.h: $($kbd.FullName)"

      - name: Cache MSKLC install
        id: cache-msklc
        uses: actions/cache@v4
        with:
          path: C:\Program Files (x86)\Microsoft Keyboard Layout Creator 1.4
          key: msklc-1.4-v1

      - name: Install MSKLC (for kbdutool)
        if: steps.cache-msklc.outputs.cache-hit != 'true'
        shell: pwsh
        run: .\scripts\install-msklc.ps1

      - name: Generate C sources (${{ matrix.variant }})
        shell: pwsh
        run: .\scripts\generate.ps1 -Variant ${{ matrix.variant }}

      - name: Set up MSVC (${{ matrix.arch }})
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Build DLL
        shell: pwsh
        run: .\scripts\build.ps1 -Arch ${{ matrix.arch }} -Variant ${{ matrix.variant }}

      - name: Verify DLL
        shell: pwsh
        run: |
          $spec = & { . .\scripts\variants.ps1; Get-VariantSpec -Name '${{ matrix.variant }}' }
          .\tests\verify-dll.ps1 -DllPath "build\${{ matrix.arch }}\$($spec.DllName)" -ExpectedArch "${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: dll-${{ matrix.arch }}-${{ matrix.variant }}
          path: build/${{ matrix.arch }}/*.dll
          if-no-files-found: error

  qa:
    name: QA golden check (x64 default)
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dll-x64-default
          path: artifacts
      - name: Golden-check character table
        shell: pwsh
        run: |
          $dll = Get-ChildItem artifacts -Recurse -Filter kbdisdv.dll | Select-Object -First 1
          if (-not $dll) { throw "No kbdisdv.dll in artifacts" }
          .\tests\golden-check.ps1 -DllPath $dll.FullName

  package-scripts:
    name: Package install scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: scripts
          path: |
            scripts/install.ps1
            scripts/uninstall.ps1
            scripts/variants.ps1
            README.md
            LICENSE
            ROADMAP.md
          if-no-files-found: error

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build, qa, package-scripts]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package release bundle
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          root="release/keyremap-${tag}"
          mkdir -p "$root"
          for a in x86 x64 arm64; do
            mkdir -p "$root/$a"
            # Collect all variant DLLs for this arch
            find "artifacts" -type f -name '*.dll' -path "*dll-$a-*" -exec cp {} "$root/$a/" \;
          done
          cp artifacts/scripts/*.ps1 "$root/"
          cp artifacts/scripts/README.md artifacts/scripts/LICENSE artifacts/scripts/ROADMAP.md "$root/"
          cd release && zip -r "keyremap-${tag}.zip" "keyremap-${tag}"
          ls -la
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/keyremap-${{ github.ref_name }}.zip
          generate_release_notes: true
